<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tư vấn da - Bác sĩ Lan</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 35px; width: 400px; }
        h2 { text-align: center; color: #667eea; margin-bottom: 25px; font-size: 26px; }
        input { width: 100%; padding: 12px 15px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; }
        input:focus { border-color: #667eea; }
        .btn-tinh { width: 100%; padding: 13px; margin-top: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-xoa { width: 100%; padding: 10px; margin-top: 8px; background: none; color: #999; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; cursor: pointer; }
        .ket-qua-item { background: #f7f7ff; border-left: 4px solid #667eea; border-radius: 8px; padding: 10px 15px; margin-top: 10px; font-size: 15px; }
    </style>
</head>
<body>
<div class="card">
    <h2>💜 Tư vấn da - Bác sĩ Lan</h2>
    <input type="text" id="ten" placeholder="Nhập tên khách hàng">
    <input type="number" id="canNang" placeholder="Cân nặng (kg)">
    <input type="number" id="chieuCao" placeholder="Chiều cao (m), vd: 1.60">
    <button class="btn-tinh" onclick="tinhBMI()">Tính BMI</button>
    <button class="btn-xoa" onclick="xoa()">Xóa toàn bộ</button>
    <div id="danh-sach" style="margin-top:10px"></div>
</div>
<script>
let danhSach = JSON.parse(localStorage.getItem("bmiList")) || [];
function tinhBMI() {
    let ten = document.getElementById("ten").value.trim();
    let canNang = parseFloat(document.getElementById("canNang").value);
    let chieuCao = parseFloat(document.getElementById("chieuCao").value);
    if (!ten || !canNang || !chieuCao) { alert("Nhập đầy đủ thông tin!"); return; }
    let bmi = canNang / (chieuCao * chieuCao);
    let loai = bmi < 18.5 ? "Gầy" : bmi < 23 ? "Bình thường" : bmi < 25 ? "Thừa cân" : "Béo phì";
    danhSach.push(ten + " - BMI: " + bmi.toFixed(2) + " - " + loai);
    localStorage.setItem("bmiList", JSON.stringify(danhSach));
    hienThi();
}
function hienThi() {
    document.getElementById("danh-sach").innerHTML = danhSach.map(i => '<div class="ket-qua-item">' + i + '</div>').join("");
}
function xoa() {
    localStorage.removeItem("bmiList"); danhSach = []; hienThi();
}
hienThi();
</script>
</body>
</html>
